version: "3.9"

services:
  postgres:
    image: postgres:18-alpine
    container_name: ucp-client-db
    environment:
      POSTGRES_DB: ucp_client
      POSTGRES_USER: ucp_user
      POSTGRES_PASSWORD: ucp_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ucp_user -d ucp_client"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
    driver: local
